name: 'GitVersion Action'
description: 'This GitHub Action extracts version information using GitVersion and optionally updates Terraform module files and generates changelogs using GitHub Models AI.'

inputs:
  gitVersionConfigPath:
    description: 'Path to a custom gitversion.yml. If empty, uses the default config bundled with this action.'
    required: false
    default: ''

  useChangeLogPromptDefaultConfig:
    description: 'Whether to use the default CHANGELOG prompt configuration'
    required: false
    default: 'true'

  isTerraformModule:
    description: 'Whether the repository is a Terraform module'
    required: false
    default: 'false'

  githubToken:
    description: 'GitHub PAT with models:read permission for AI changelog generation'
    required: false
    default: ${{ github.token }}

outputs:
  majorVersion:
    description: 'Major version number'
    value: ${{ steps.gitversion.outputs.major }}

  minorVersion:
    description: 'Minor version number'
    value: ${{ steps.gitversion.outputs.minor }}

  patchVersion:
    description: 'Patch version number'
    value: ${{ steps.gitversion.outputs.patch }}

  majorMinorVersion:
    description: 'Major.Minor version'
    value: ${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}
  
  majorMinorPatchVersion:
    description: 'Major.Minor.Patch version'
    value: ${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}

runs:
  using: 'composite'
  steps:
    # - name: Install Terraform
    #   if: ${{ inputs.isTerraformModule == 'true' }}
    #   uses: hashicorp/setup-terraform@v3

    # - name: Terraform fmt
    #   if: ${{ inputs.isTerraformModule == 'true' }}
    #   shell: bash
    #   run: terraform fmt -check
    #   continue-on-error: false

    - name: Configure Git
      shell: bash
      run: |
        echo "==> Configuring Git user..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
      
    - name: Resolve GitVersion config
      id: config
      shell: bash
      run: |
        if [ -n "$CUSTOM_CONFIG" ] && [ -f "$CUSTOM_CONFIG" ]; then
          echo "config-path=${{ inputs.gitVersionConfigPath }}" >> $GITHUB_OUTPUT
        else
          cp "${GITHUB_ACTION_PATH}/config/gitversion.yml" "${GITHUB_WORKSPACE}/gitversion.yml"
          echo "config-path=${GITHUB_WORKSPACE}/gitversion.yml" >> $GITHUB_OUTPUT
        fi

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4
      with:
        configFilePath: ${{ steps.config.outputs.config-path }}

    - name: Export version variables
      shell: bash
      run: |
        echo "MAJOR_VERSION=${{ steps.gitversion.outputs.major }}" >> $GITHUB_ENV
        echo "MINOR_VERSION=${{ steps.gitversion.outputs.minor }}" >> $GITHUB_ENV
        echo "PATCH_VERSION=${{ steps.gitversion.outputs.patch }}" >> $GITHUB_ENV
        echo "MAJOR_MINOR_VERSION=${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}" >> $GITHUB_ENV
        echo "MAJOR_MINOR_PATCH_VERSION=${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}" >> $GITHUB_ENV
        echo "REPO_URL=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_ENV
        echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\")" >> $GITHUB_ENV
        echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV

    - name: Version summary
      shell: bash
      run: |
        VERSION="${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}"
        CONFIG_PATH="${{ steps.config.outputs.config-path }}"
        echo "==> Calculated version: v${VERSION}"
        echo "==> GitVersion config used: ${CONFIG_PATH}"
        echo "### GitVersion Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Major** | \`${{ steps.gitversion.outputs.major }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Minor** | \`${{ steps.gitversion.outputs.minor }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Patch** | \`${{ steps.gitversion.outputs.patch }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Config** | \`${CONFIG_PATH}\` |" >> $GITHUB_STEP_SUMMARY

    - name: Prepare CHANGELOG prompt
      if: ${{ inputs.useChangeLogPromptDefaultConfig == 'true' && inputs.isTerraformModule == 'true' }}
      shell: bash
      run: |
        COMPARE_LINK="## [v${{ env.MAJOR_MINOR_PATCH_VERSION }}](${{ env.REPO_URL }}/compare/${{ env.PREVIOUS_TAG }}...v${{ env.MAJOR_MINOR_PATCH_VERSION }}) (${{ env.TODAY }})"
        GIT_LOG=$(git log "${{ env.PREVIOUS_TAG }}...HEAD" --pretty=format:"%s")
        EXISTING_CHANGELOG=$(cat CHANGELOG.md 2>/dev/null || echo "")

        echo "CHANGELOG_COMPARE_LINK=${COMPARE_LINK}" >> $GITHUB_ENV

        cat > /tmp/changelog.prompt <<PROMPT_EOF
        Generate a changelog entry for version v${{ env.MAJOR_MINOR_PATCH_VERSION }} following Keep a Changelog v1.1.0 format.

        Commits since last release:
        ${GIT_LOG}

        Existing CHANGELOG.md for format reference:
        ${EXISTING_CHANGELOG}

        ## Instructions:
        1. **Output Format**: Generate ONLY the changelog entry body with sections for this release
        2. **Sections** (use only if relevant):
          - ### Security (security fixes and vulnerability patches)
          - ### Deprecated (deprecated features)
          - ### Removed (removed functionality)
          - ### Added (new features and capabilities)
          - ### Changed (changes in existing functionality)
          - ### Fixed (bug fixes)

        3. **Writing Style**:
          - Start each item with "- " (markdown bullet point)
          - Use active voice and past tense ("Added support for..." not "Support was added...")
          - Be concise but descriptive (one line per item, max 80 chars)
          - Reference GitHub issues when relevant: "Fixed bug in parser (#123)"

        4. **Commit Filtering**:
          - Ignore "chore: bump version", "chore: release", "docs: update" (unless significant)
          - Group related commits under one bullet point
          - Convert Conventional Commits to readable sentences:
            * "feat: X" -> "Added X"
            * "fix: X" -> "Fixed X"
            * "docs: X" -> "Improved documentation for X"
            * "refactor: X" -> "Refactored X for better maintainability"

        5. **Do NOT include**:
          - Version header (no "## [v1.0.0]")
          - Markdown fences or code blocks
          - Any explanation or introduction text
          - Internal implementation details

        ## Example Output:
        - Added support for TypeScript configuration files
        - Fixed memory leak in event listener cleanup (#456)
        - Deprecated oldFunction() in favor of newFunction()
        - Improved error messages for better debugging

        Generate the changelog entry now:
        PROMPT_EOF

    - name: Generate changelog with GitHub Models AI
      if: ${{ inputs.isTerraformModule == 'true' }}
      id: ai-changelog
      uses: actions/ai-inference@v1
      continue-on-error: false
      with:
        model: 'openai/gpt-4o-mini'
        prompt-file: '/tmp/changelog.prompt'

    - name: Update changelog, version files and push tags
      if: ${{ inputs.isTerraformModule == 'true' }}
      shell: bash
      run: |
        VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ env.PATCH_VERSION }}"

        ENTRY=$(printf '%s\n\n%s' "$CHANGELOG_COMPARE_LINK" "${{ steps.ai-changelog.outputs.response }}")

        awk -v entry="$ENTRY" '
          /^All notable changes/ { print; printf "\n%s\n", entry; next }
          { print }
        ' CHANGELOG.md > CHANGELOG.md.tmp

        mv CHANGELOG.md.tmp CHANGELOG.md
        echo "==> Changelog updated."

        # Update version in Terraform files
        sed -i "s/\(\"technical:module:version\"\).*/\1 : \"${VERSION}\"/" 01-locals.tf
        sed -i "s/\(terraform-aws-.*?ref=\).*/\1v${VERSION}\"/" README.md
        sed -i "s/\(terraform-aws-.*?ref=\).*/\1v${VERSION}\"/" .terraform-docs.yml

        # Single commit with all changes
        git add CHANGELOG.md 01-locals.tf README.md .terraform-docs.yml || true
        git commit -m "chore: bump version to v${VERSION}" || echo "No changes to commit."

        # Tag and push
        git tag "v${VERSION}"
        git push origin "v${VERSION}"
        git push origin $(git rev-parse --abbrev-ref HEAD)
