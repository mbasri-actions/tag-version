name: 'GitVersion Action'
description: 'This GitHub Action extracts version information using GitVersion and optionally updates Terraform module files and generates changelogs using GitHub Models AI.'

inputs:
  useGitVersionDefaultConfig:
    description: 'Whether to use the default GitVersion configuration'
    required: false
    default: 'true'

  gitVersionConfigFilePath:
    description: 'Path to a custom GitVersion configuration file'
    required: false
    default: 'gitversion.yml'

  isTerraformModule:
    description: 'Whether the repository is a Terraform module'
    required: false
    default: 'false'

  githubToken:
    description: 'GitHub PAT with models:read permission for AI changelog generation'
    required: false
    default: ${{ github.token }}

outputs:
  majorVersion:
    description: 'Major version number'
    value: ${{ steps.gitversion.outputs.major }}

  minorVersion:
    description: 'Minor version number'
    value: ${{ steps.gitversion.outputs.minor }}

  patchVersion:
    description: 'Patch version number'
    value: ${{ steps.gitversion.outputs.patch }}

  majorMinorVersion:
    description: 'Major.Minor version'
    value: ${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}
  
  majorMinorPatchVersion:
    description: 'Major.Minor.Patch version'
    value: ${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}

runs:
  using: 'composite'
  steps:
    # - name: Install Terraform
    #   if: ${{ inputs.isTerraformModule == 'true' }}
    #   uses: hashicorp/setup-terraform@v3

    # - name: Terraform fmt
    #   if: ${{ inputs.isTerraformModule == 'true' }}
    #   shell: bash
    #   run: terraform fmt -check
    #   continue-on-error: false

    - name: Create default GitVersion config
      if: ${{ inputs.useGitVersionDefaultConfig == 'true' }}
      shell: bash
      run: |
        echo "==> Creating default GitVersion configuration file (gitversion.yml)..."
        cat > gitversion.yml << 'EOF'
        workflow: GitHubFlow/v1
        tag-prefix: '[vV]'
        major-version-bump-message: '(BREAKING CHANGE|^.+!:)'
        minor-version-bump-message: '^feat(\([^)]+\))?:\s'
        patch-version-bump-message: '^(fix|perf|refactor|revert|chore|docs|style|test|ci)(\([^)]+\))?:\s'
        #patch-version-bump-message: '^(fix|perf|refactor|revert)(\([^)]+\))?:\s'
        #no-bump-message: '^(chore|docs|style|test|ci)(\([^)]+\))?:\s'
        commit-message-incrementing: Enabled
        strategies:
          - MergeMessage
          - TaggedCommit
          - TrackReleaseBranches
          - VersionInBranchName
        branches:
          main:
            mode: ContinuousDeployment
            increment: Patch
            regex: ^master$|^main$
            is-main-branch: true
          release:
            mode: ContinuousDeployment
            increment: Minor
            regex: ^release/(?<BranchName>[0-9]+\.[0-9]+\.[0-9]+)$
            is-release-branch: true
          develop:
            mode: ContinuousDelivery
            increment: Patch
            regex: ^dev(elop)?(ment)?$
        commit-date-format: ddMMyyyy
        assembly-versioning-scheme: MajorMinorPatch
        assembly-informational-format: '{SemVer}'
        EOF
        echo "Default gitversion.yml created."

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4
      with:
        configFilePath: ${{ inputs.gitVersionConfigFilePath }}

    - name: Export version variables
      shell: bash
      run: |
        echo "MAJOR_VERSION=${{ steps.gitversion.outputs.major }}" >> $GITHUB_ENV
        echo "MINOR_VERSION=${{ steps.gitversion.outputs.minor }}" >> $GITHUB_ENV
        echo "PATCH_VERSION=${{ steps.gitversion.outputs.patch }}" >> $GITHUB_ENV
        echo "MAJOR_MINOR_VERSION=${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}" >> $GITHUB_ENV
        echo "MAJOR_MINOR_PATCH_VERSION=${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}" >> $GITHUB_ENV
        echo "REPO_URL=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_ENV
        echo "PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\")" >> $GITHUB_ENV
        echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV


    - name: Configure Git
      shell: bash
      run: |
        echo "==> Configuring Git user..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Prepare changelog prompt
      if: ${{ inputs.isTerraformModule == 'true' }}
      shell: bash
      run: |
        COMPARE_LINK="## [v${{ env.MAJOR_MINOR_PATCH_VERSION }}](${{ env.REPO_URL }}/compare/${{ env.PREVIOUS_TAG }}...v${{ env.MAJOR_MINOR_PATCH_VERSION }}) (${{ env.TODAY }})"
        GIT_LOG=$(git log "${{ env.PREVIOUS_TAG }}...HEAD" --pretty=format:"%s")
        EXISTING_CHANGELOG=$(cat CHANGELOG.md 2>/dev/null || echo "")

        echo "CHANGELOG_COMPARE_LINK=${COMPARE_LINK}" >> $GITHUB_ENV

        cat > /tmp/changelog.prompt << PROMPT_EOF
        Generate a changelog entry for version v${{ env.MAJOR_MINOR_PATCH_VERSION }}.

        Commits since last release:
        ${GIT_LOG}

        Existing CHANGELOG.md for format reference:
        ${EXISTING_CHANGELOG}

        Rules:
        - Output ONLY the changelog entry body (bullet points and optional subsections), nothing else
        - Use subsections "### Breaking Changes", "### Added", "### Removed", "### Fixed" only when relevant
        - For simple releases, use plain bullet points without subsections
        - Each bullet point starts with "- " and describes the change concisely
        - Do not include the version header line
        - Do not include any markdown fences or explanation
        - Ignore "chore: bump version" commits
        - Write in English
        PROMPT_EOF

    - name: Generate changelog with GitHub Models AI
      if: ${{ inputs.isTerraformModule == 'true' }}
      id: ai-changelog
      uses: actions/ai-inference@v1
      with:
        model: 'openai/gpt-4o-mini'
        prompt-file: '/tmp/changelog.prompt'

    - name: Update changelog, version files and push tags
      if: ${{ inputs.isTerraformModule == 'true' }}
      shell: bash
      run: |
        VERSION="${{ env.MAJOR_VERSION }}.${{ env.MINOR_VERSION }}.${{ env.PATCH_VERSION }}"

        # Write changelog entry
        CHANGELOG_BODY="${{ steps.ai-changelog.outputs.response }}"

        if [ -z "$CHANGELOG_BODY" ]; then
          echo "::error::GitHub Models AI returned empty content."
          exit 1
        fi

        ENTRY=$(printf '%s\n\n%s' "$CHANGELOG_COMPARE_LINK" "$CHANGELOG_BODY")

        if grep -q "^## \[Unreleased\]" CHANGELOG.md; then
          awk -v entry="$ENTRY" '
            /^## \[Unreleased\]/ { print; printf "\n%s\n", entry; next }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp
        else
          awk -v entry="$ENTRY" '
            /^All notable changes/ { print; printf "\n%s\n", entry; next }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp
        fi

        mv CHANGELOG.md.tmp CHANGELOG.md
        echo "==> Changelog updated."

        # Update version in Terraform files
        sed -i "s/\(\"technical:module:version\"\).*/\1 : \"${VERSION}\"/" 01-locals.tf
        sed -i "s/\(terraform-aws-.*?ref=\).*/\1v${VERSION}\"/" README.md
        sed -i "s/\(terraform-aws-.*?ref=\).*/\1v${VERSION}\"/" .terraform-docs.yml

        # Single commit with all changes
        git add CHANGELOG.md 01-locals.tf README.md .terraform-docs.yml || true
        git commit -m "chore: bump version to v${VERSION}" || echo "No changes to commit."

        # Tag and push
        git tag "v${VERSION}"
        git push origin "v${VERSION}"
        git push origin $(git rev-parse --abbrev-ref HEAD)
