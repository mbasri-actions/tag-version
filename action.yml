name: 'GitVersion Action'
description: 'This GitHub Action extracts version information using GitVersion and optionally updates Terraform module files and generates changelogs using GitHub Models AI.'

inputs:
  gitVersionConfigPath:
    description: 'Path to a custom gitversion.yml. If empty, uses the default config bundled with this action.'
    required: false
    default: ''

  isTerraformModule:
    description: 'Whether the repository is a Terraform module'
    required: false
    default: 'false'

  changeLogPromptPath:
    description: 'Path to a custom changelog prompt template. If empty, uses the default prompt bundled with this action. Variables ${VERSION}, ${GIT_LOG}, ${EXISTING_CHANGELOG} are substituted at runtime.'
    required: false
    default: ''

outputs:  
  majorMinorPatchVersion:
    description: 'Major.Minor.Patch version'
    value: ${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}

runs:
  using: 'composite'
  steps:

    - name: Configure Git
      shell: bash
      run: |
        echo "==> Configuring Git user..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
      
    - name: Resolve GitVersion config
      id: config
      shell: bash
      run: |
        CONFIG_PATH="${{ inputs.gitVersionConfigPath }}"
        echo "gitVersionConfigPath=${CONFIG_PATH:-${GITHUB_ACTION_PATH}/config/gitversion.yml}" >> $GITHUB_OUTPUT

    - name: Setup GitVersion
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: '6.4.x'

    - name: Execute GitVersion
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4
      with:
        configFilePath: ${{ steps.config.outputs.gitVersionConfigPath }}

    - name: Export version variables
      shell: bash
      run: |
        VERSION="${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}.${{ steps.gitversion.outputs.patch }}"
        PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)

        echo "MAJOR_MINOR_PATCH_VERSION=${VERSION}" >> $GITHUB_ENV
        echo "REPO_URL=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_ENV
        echo "PREVIOUS_TAG=${PREV_TAG}" >> $GITHUB_ENV
        echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV

        echo "### Release v${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| | |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | \`v${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Previous** | \`${PREV_TAG:-none}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | \`$(git rev-parse --abbrev-ref HEAD)\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Config** | \`${{ steps.config.outputs.gitVersionConfigPath }}\` |" >> $GITHUB_STEP_SUMMARY

    - name: Prepare CHANGELOG prompt
      shell: bash
      run: |
        PROMPT_PATH="${{ inputs.changeLogPromptPath }}"
        PROMPT_TEMPLATE="${PROMPT_PATH:-${GITHUB_ACTION_PATH}/config/changelog.prompt.tpl}"

        export VERSION="${{ env.MAJOR_MINOR_PATCH_VERSION }}"
        
        if [ -n "${{ env.PREVIOUS_TAG }}" ]; then
          export GIT_LOG=$(git log "${{ env.PREVIOUS_TAG }}...HEAD" --pretty=format:"%s")
          COMPARE_LINK="## [v${VERSION}](${{ env.REPO_URL }}/compare/${{ env.PREVIOUS_TAG }}...v${VERSION}) (${{ env.TODAY }})"
        else
          export GIT_LOG=$(git log --pretty=format:"%s")
          COMPARE_LINK="## [v${VERSION}](${{ env.REPO_URL }}/releases/tag/v${VERSION}) (${{ env.TODAY }})"
        fi
        export EXISTING_CHANGELOG=$(cat CHANGELOG.md 2>/dev/null || echo "")

        envsubst '${VERSION} ${GIT_LOG} ${EXISTING_CHANGELOG}' < "$PROMPT_TEMPLATE" > /tmp/changelog.prompt

        echo "CHANGELOG_COMPARE_LINK=${COMPARE_LINK}" >> $GITHUB_ENV

    - name: Generate changelog with GitHub Models AI
      id: ai-changelog
      uses: actions/ai-inference@v2
      continue-on-error: false
      with:
        model: 'openai/gpt-4o-mini'
        prompt-file: '/tmp/changelog.prompt'

    - name: Update CHANGELOG
      shell: bash
      run: |
        ENTRY=$(printf '%s\n\n%s' "$CHANGELOG_COMPARE_LINK" "${{ steps.ai-changelog.outputs.response }}")

        awk -v entry="$ENTRY" '
          /^All notable changes/ { print; printf "\n%s\n", entry; next }
          { print }
        ' CHANGELOG.md > CHANGELOG.md.tmp

        mv CHANGELOG.md.tmp CHANGELOG.md
        git add CHANGELOG.md
        echo "==> Changelog updated."

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "### Changelog" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "${{ steps.ai-changelog.outputs.response }}" >> $GITHUB_STEP_SUMMARY

    - name: Update Terraform module version files
      if: ${{ inputs.isTerraformModule == 'true' }}
      shell: bash
      run: |
        MAJOR_MINOR_PATCH_VERSION="${{ env.MAJOR_MINOR_PATCH_VERSION }}"
        sed -i "s/\(\"technical:module:version\"\).*/\1 : \"${MAJOR_MINOR_PATCH_VERSION}\"/" 01-locals.tf
        sed -i "s/\(terraform-aws-[^\"]*?ref=\).*/\1v${MAJOR_MINOR_PATCH_VERSION}\"/" README.md
        sed -i "s/\(terraform-aws-[^\"]*?ref=\).*/\1v${MAJOR_MINOR_PATCH_VERSION}\"/" .terraform-docs.yml
        git add 01-locals.tf README.md .terraform-docs.yml
        echo "==> Terraform version files updated."

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| **Terraform files** | updated |" >> $GITHUB_STEP_SUMMARY

    - name: Commit, tag and push
      shell: bash
      run: |
        MAJOR="${{ steps.gitversion.outputs.major }}"
        MAJOR_MINOR="${{ steps.gitversion.outputs.major }}.${{ steps.gitversion.outputs.minor }}"
        MAJOR_MINOR_PATCH_VERSION="${{ env.MAJOR_MINOR_PATCH_VERSION }}"

        git commit -m "chore: bump version to v${MAJOR_MINOR_PATCH_VERSION}" || echo "No changes to commit."

        git tag -f "v${MAJOR}"
        git tag -f "v${MAJOR_MINOR}"
        git tag "v${MAJOR_MINOR_PATCH_VERSION}"

        git push origin -f "v${MAJOR}"
        git push origin -f "v${MAJOR_MINOR}"
        git push origin "v${MAJOR_MINOR_PATCH_VERSION}"
        git push origin $(git rev-parse --abbrev-ref HEAD)

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "---" >> $GITHUB_STEP_SUMMARY
        echo "**Tags pushed:** \`v${MAJOR}\` · \`v${MAJOR_MINOR}\` · \`v${MAJOR_MINOR_PATCH_VERSION}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
